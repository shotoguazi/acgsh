server {
    listen 80;
    server_name koicomic.com www.koicomic.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name koicomic.com www.koicomic.com;

    # SSL - 用你的证书路径替换
    ssl_certificate /etc/letsencrypt/live/koicomic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koicomic.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    root /var/www/koicomic/dist;
    index index.html;

    # 静态文件缓存
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /mib/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri.html $uri/index.html /404.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    location = /404.html {
        internal;
    }

    access_log /var/log/nginx/koicomic-access.log;
    error_log /var/log/nginx/koicomic-error.log;
}
